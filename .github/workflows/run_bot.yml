name: Run Telegram Bot

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # يعيد تشغيل البوت تلقائياً كل 6 ساعات لتجنب توقفه
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً بضغطة زر

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Bot Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} # لحماية توكن البوت الخاص بك
      run: |
        python main.py # استبدل main.py باسم ملف التشغيل الأساسي للبوت لديك
        
