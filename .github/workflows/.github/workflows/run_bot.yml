name: 24/7 Telegram Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # يعيد تشغيل البوت تلقائياً كل 4 ساعات لتفادي الإيقاف الإجباري
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # إيقاف آمن قبل الوصول لـ 6 ساعات لتبدأ الدورة الجديدة

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI # تثبيت المكتبة مباشرة لحل أعطال نقص المكتبات

    - name: Run Bot Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: |
        python main.py
        
